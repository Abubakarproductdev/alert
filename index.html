<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Audio Alerts</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 100px; 
        }

        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: red; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            margin: 10px;
        }

        p { 
            font-size: 18px; 
            color: #333; 
        }
    </style>
</head>
<body>

    <audio id="sound60" src="sound600.mp3"></audio>

    <button id="startBtn" onclick="startApp()">Start</button>
    <button onclick="stopApp()">Stop</button>
    <p id="status">Stopped</p>

    <script>
        let alertInterval = null;

        function startApp() {
            const status = document.getElementById('status');
            const button = document.getElementById('startBtn');
            const sound = document.getElementById('sound60');

            if (alertInterval) return;

            status.innerText = "Running: Sound every 5 minutes";

            // button green
            button.innerText = "Running";
            button.style.backgroundColor = "green";

            // play once immediately (important for browser permission)
            sound.play().catch(() => console.log("Click allowed audio"));

            alertInterval = setInterval(() => {
                sound.currentTime = 0; // restart sound
                sound.play().catch(() => console.log("Audio blocked"));
            }, 5 * 60 * 1000);
        }

        function stopApp() {
            const status = document.getElementById('status');
            const button = document.getElementById('startBtn');

            if (alertInterval) {
                clearInterval(alertInterval);
                alertInterval = null;
            }

            status.innerText = "Stopped";

            // button red
            button.innerText = "Start";
            button.style.backgroundColor = "red";
        }
    </script>

</body>
</html>
